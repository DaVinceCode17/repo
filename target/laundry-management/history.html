<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Order History - Cyron's Laundry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #d4edff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .main-wrapper {
            width: 100%;
            max-width: 700px;
            margin-top: 20px;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
        }

        .top-bar .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: #0f2b3a;
            padding: 6px 12px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
        }
        .top-bar .user-info i {
            font-size: 1.6rem;
            color: #0f2b3a;
        }

        .back-btn {
            font-size: 0.75rem;
            color: #0f2b3a;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .page-title {
            text-align: center;
            margin-bottom: 16px;
        }
        .page-title h2 {
            color: #0f2b3a;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .page-title .sub-title {
            color: #0f2b3a;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .container {
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 24px 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.10);
        }

        .table-wrap {
            overflow-x: auto;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th, td {
            padding: 10px 12px;
            border: 1px solid #e8eef2;
            text-align: left;
        }
        th {
            background: #eef3f7;
            font-weight: 600;
            color: #0f2b3a;
        }
        td {
            background: white;
        }

        .badge {
            padding: 3px 12px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 600;
            color: white;
            text-transform: capitalize;
        }
        .badge.completed {
            background: #1a8c4a;
        }
        .badge.delivered {
            background: #2e7d32;
        }

        .empty-state {
            text-align: center;
            color: #6f8fa2;
            padding: 30px 0;
            font-size: 0.9rem;
        }

        .loading-state {
            text-align: center;
            color: #6f8fa2;
            padding: 30px 0;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .main-wrapper { margin-top: 10px; }
            .container { padding: 18px 14px; border-radius: 24px; }
            .top-bar .user-info { font-size: 0.9rem; padding: 4px 10px; }
            .top-bar .user-info i { font-size: 1.3rem; }
            .page-title h2 { font-size: 1.3rem; }
            table { font-size: 0.7rem; }
            th, td { padding: 6px 8px; }
        }

        @media (max-width: 450px) {
            body { padding: 8px; }
            .main-wrapper { margin-top: 6px; }
            .container { padding: 14px 10px; border-radius: 20px; }
            .top-bar .user-info { font-size: 0.8rem; padding: 4px 8px; }
            .top-bar .user-info i { font-size: 1.1rem; }
            .back-btn { font-size: 0.65rem; padding: 4px 10px; }
            .page-title h2 { font-size: 1.1rem; }
            table { font-size: 0.65rem; }
            th, td { padding: 4px 6px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">

        <!-- ===== TOP BAR ===== -->
        <div class="top-bar">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="userNameDisplay">Customer</span>
            </div>
            <a href="customer.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>

        <!-- ===== TITLE ===== -->
        <div class="page-title">
            <h2>📜 Order History</h2>
            <p class="sub-title">Your completed and delivered orders</p>
        </div>

        <!-- ===== CONTAINER ===== -->
        <div class="container">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Order</th>
                            <th>Services</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr><td colspan="5" class="loading-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const customerId = localStorage.getItem('current_customer_id');

        // ===== CHECK IF LOGGED IN =====
        if (!customerId) {
            window.location.href = 'login.html';
        }

        // ===== LOAD USER NAME =====
        async function loadUser() {
            try {
                const response = await fetch('/api/laundry/customer/' + customerId);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('userNameDisplay').textContent = data.customer.firstName + ' ' + data.customer.lastName;
                }
            } catch (error) {
                console.error('Error loading user:', error);
                document.getElementById('userNameDisplay').textContent = 'Customer';
            }
        }

        // ===== LOAD HISTORY =====
        async function loadHistory() {
            const tbody = document.getElementById('historyTableBody');

            try {
                const response = await fetch('/api/orders/customer/' + customerId);
                const data = await response.json();

                if (data.success && data.orders && data.orders.length > 0) {
                    // Filter completed and delivered orders
                    const history = data.orders.filter(o => o.status === 'completed' || o.status === 'delivered');

                    if (history.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No completed orders yet.</td></tr>';
                        return;
                    }

                    let html = '';
                    history.forEach(o => {
                        const statusClass = o.status === 'completed' ? 'completed' : 'delivered';
                        const statusLabel = o.status.charAt(0).toUpperCase() + o.status.slice(1);
                        const serviceTypeLabel = o.serviceType === 'dropoff' ? 'Drop-off' : 'Pick-up';
                        html += `
                            <tr>
                                <td><strong>#${o.queueNumber || 'N/A'}</strong></td>
                                <td>${o.services || 'N/A'}</td>
                                <td>${serviceTypeLabel}</td>
                                <td><span class="badge ${statusClass}">${statusLabel}</span></td>
                                <td>${o.createdAt || 'N/A'}</td>
                            </tr>
                        `;
                    });
                    tbody.innerHTML = html;
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No orders found.</td></tr>';
                }
            } catch (error) {
                console.error('Error loading history:', error);
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Error loading history. Please try again.</td></tr>';
            }
        }

        // ===== INIT =====
        loadUser();
        loadHistory();
    </script>

</body>
</html>
